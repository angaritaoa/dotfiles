<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- DPI exacto del Apple Studio Display -->
    <match target="pattern">
        <edit name="dpi" mode="assign">
            <double>218</double>
        </edit>
    </match>
	<match target="font">
		<edit name="antialias" mode="assign">
			<bool>true</bool>
		</edit>
	</match>
	<match target="font">
		<edit name="hinting" mode="assign">
			<bool>true</bool>
		</edit>
	</match>
	<match target="font">
		<edit name="autohint" mode="assign">
			<bool>false</bool>
		</edit>
	</match>
	<match target="font">
		<edit name="hintstyle" mode="assign">
			<const>hintslight</const>
		</edit>
	</match>
	<match target="font">
		<edit name="rgba" mode="assign">
			<const>rgb</const>
		</edit>
	</match>
	<match target="font">
		<edit name="lcdfilter" mode="assign">
			<const>lcdlight</const>
		</edit>
	</match>
	<alias>
		<family>sans-serif</family>
		<prefer><family>Adwaita Sans</family></prefer>
	</alias>
	<alias>
		<family>serif</family>
		<prefer><family>Adwaita Sans</family></prefer>
	</alias>
	<alias>
		<family>monospace</family>
		<prefer><family>Lilex Light</family></prefer>
	</alias>
</fontconfig>
