# GNOME GDM Theme for Hyprlock
# Design inspired by GNOME Adwaita & GDM UX

$font = Adwaita Sans, Cantarell, Sans-Serif

general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 4, easeOutQuint
    animation = fadeOut, 1, 4, easeOutQuint
    animation = inputFieldDots, 1, 3, easeOutQuint
}

background {
    monitor =
    #path = ~/.config/backgrounds/curvy-d.jxl
    color = rgba(28, 28, 28, 1.0) # Fondo base oscuro GNOME por si falla la imagen
    blur_passes = 4               # Desenfoque profundo estilo GNOME Shell
    blur_size = 6
    noise = 0.01
    contrast = 0.89
    brightness = 0.75
}

# INPUT FIELD (Estilo Adwaita Entry)
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.24
    dots_spacing = 0.40
    dots_center = true

    # Colores base de GNOME Adwaita Dark
    inner_color = rgba(47, 47, 47, 0.85)
    outer_color = rgba(255, 255, 255, 0.08)

    # Estados de autenticación (Azul GNOME, Verde Éxito, Rojo Error)
    check_color = rgba(53, 132, 228, 1.0)
    fail_color = rgba(224, 27, 36, 1.0)
    font_color = rgb(246, 245, 244)

    fade_on_empty = false
    rounding = 24 # Bordes completamente ovalados estilo GNOME 40+

    font_family = $font
    placeholder_text = <span foreground="##a8a8a7">Contraseña</span>
    fail_text = <span foreground="##ff7b72"><i>$PAMFAIL</i></span>

    position = 0, -120
    halign = center
    valign = center
}

# SALUDO / BIENVENIDA (Estilo GNOME User Session)
label {
    monitor =
    text = $USER
    font_size = 18
    font_family = $font
    font_weight = bold
    color = rgb(246, 245, 244)

    position = 0, -50
    halign = center
    valign = center
}

# TIME (Grande, centrado en la parte superior)
label {
    monitor =
    text = $TIME
    font_size = 76
    font_family = $font
    font_weight = light
    color = rgb(246, 245, 244)

    position = 0, 180
    halign = center
    valign = center
}

# DATE (Debajo del tiempo, centrado)
label {
    monitor =
    text = cmd[update:60000] echo "<b>$(date +'%A, %d de %B')</b>"
    font_size = 16
    font_family = $font
    color = rgba(246, 245, 244, 0.8)

    position = 0, 100
    halign = center
    valign = center
}

# KEYBOARD LAYOUT INDICATOR (Discreto en la esquina superior derecha o centrado abajo)
label {
    monitor =
    text = $LAYOUT[es,en]
    font_size = 11
    font_family = $font
    font_weight = bold
    color = rgba(246, 245, 244, 0.6)
    onclick = hyprctl switchxkblayout all next

    position = 0, 40
    halign = center
    valign = bottom
}
