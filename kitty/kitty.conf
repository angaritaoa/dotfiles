# ==========================================================================
# Tipografía (Fonts)
# ==========================================================================
font_family      Lilex Regular
bold_font        Lilex Bold
italic_font      Lilex Italic
bold_italic_font Lilex Bold Italic
font_size        14.0

# Ajustes de espaciado y renderizado (Equivalente a spacing=100)
adjust_line_height  0
adjust_column_width 0

# ==========================================================================
# Ventana y Padding (Margen interno)
# ==========================================================================
window_padding_width 4 6 4 6
placement_strategy   center

# ==========================================================================
# Campana (Bell)
# ==========================================================================
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell no

# ==========================================================================
# Cursor
# ==========================================================================
cursor_shape     beam
cursor_blink_interval 0.5

# ==========================================================================
# Colores y Opacidad (Doom Emacs / One Dark Theme)
# ==========================================================================
background_opacity 1.0
background         #282c34
foreground         #bbc2cf

# Cursor (Texto y Fondo)
cursor            #51afef
cursor_text_color #bbc2cf

# Selección y URLs
#selection_background #3f444a
selection_background #3d4451
url_color            #46d9ff

# --- Paleta de Colores ANSI ---

# Black / Grey
color0 #1c1f24
color8 #5b6268

# Red / Orange
color1 #ff6c6b
color9 #da8548

# Green
color2 #98be65
color10 #98be65

# Yellow
color3 #ecbe7b
color11 #ecbe7b

# Blue / Dark Blue
color4 #51afef
color12 #2257a0

# Magenta / Violet
color5 #c678dd
color13 #a9a1e1

# Cyan / Teal
color6 #4db5bd
color14 #46d9ff

# White / Bright White
color7 #5b6268
color15 #dfdfdf

# ==========================================================================
# Decoraciones de Ventana (CSD Server/Size 0)
# ==========================================================================
hide_window_decorations yes
